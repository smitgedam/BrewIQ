{% extends 'base.html' %}
{% block title %}Kitchen Display{% endblock %}
{% block page_title %}Kitchen Display System{% endblock %}
{% block content %}

<div class="mb-4 flex items-center gap-3">
  <span class="inline-flex items-center gap-1.5 text-xs text-green-600 bg-green-50 px-3 py-1 rounded-full border border-green-200">
    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
    Live — refreshes every 15s
  </span>
</div>

<div id="kds-container"
     hx-get="{% url 'orders:kds_partial' %}"
     hx-trigger="every 15s"
     hx-swap="innerHTML">
  {% include 'partials/_kds_list.html' %}
</div>
{% endblock %}
