{% extends 'base.html' %}
{% block title %}Bills{% endblock %}
{% block page_title %}
  Billing History
  <span class="inline-flex items-center gap-1.5 text-xs font-normal text-green-600 bg-green-50 px-2 py-0.5 rounded-full border border-green-200 ml-3 align-middle">
    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Live
  </span>
{% endblock %}
{% block content %}
<div class="card">
  <table class="w-full text-sm">
    <thead>
      <tr class="border-b border-gray-100">
        <th class="text-left py-3 px-3 font-semibold text-gray-600">Bill #</th>
        <th class="text-left py-3 px-3 font-semibold text-gray-600">Order #</th>
        <th class="text-left py-3 px-3 font-semibold text-gray-600">Subtotal</th>
        <th class="text-left py-3 px-3 font-semibold text-gray-600">GST</th>
        <th class="text-left py-3 px-3 font-semibold text-gray-600">Total</th>
        <th class="text-left py-3 px-3 font-semibold text-gray-600">Mode</th>
        <th class="text-left py-3 px-3 font-semibold text-gray-600">Status</th>
        <th class="text-left py-3 px-3 font-semibold text-gray-600">Date</th>
        <th class="py-3 px-3"></th>
      </tr>
    </thead>
    <!-- tbody polls every 12s — new bills from any cashier appear automatically -->
    <tbody id="bill-list-body"
           hx-get="{% url 'billing:partial_bill_list' %}"
           hx-trigger="every 12s"
           hx-swap="innerHTML">
      {% include 'partials/_bill_list_rows.html' %}
    </tbody>
  </table>
</div>
{% endblock %}
