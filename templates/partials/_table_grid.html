<div class="grid grid-cols-3 gap-2">
  {% for table in tables %}
  <div class="rounded-lg p-3 text-center
    {% if table.is_occupied %}bg-red-50 border border-red-200{% else %}bg-green-50 border border-green-200{% endif %}">
    <p class="font-bold {% if table.is_occupied %}text-red-700{% else %}text-green-700{% endif %}">
      T{{ table.number }}
    </p>
    <p class="text-xs {% if table.is_occupied %}text-red-500{% else %}text-green-500{% endif %}">
      {% if table.is_occupied %}Busy{% else %}Free{% endif %}
    </p>
  </div>
  {% empty %}
    <p class="col-span-3 text-xs text-gray-400 text-center py-4">No tables configured.</p>
  {% endfor %}
</div>
<div class="mt-4 pt-4 border-t border-gray-100">
  <a href="{% url 'orders:table_list' %}" class="text-sm text-amber-600 hover:text-amber-800">Manage tables →</a>
</div>
